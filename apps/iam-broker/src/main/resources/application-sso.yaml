sso:
  enabled: true

  # Token-format settings — IGTK matches client TokenGenerator semantics
  token:
    default-prefix: H_                # Hyundai (HMA); G_ for Genesis (GMA)
    timestamp-format: yyyyMMddHHmmssSSS
    igtk:
      ttl-seconds: 3600
    saml:
      ttl-seconds: 300
    aes256:
      ttl-seconds: 60
      # AES-256-GCM key — 32 bytes. POC default; override via env.
      shared-key: ${AES256_SHARED_KEY:poc-aes256-key-must-be-32bytes!!}
    rc4:
      ttl-seconds: 30
      shared-key: ${RC4_SHARED_KEY:poc-rc4-shared-key}
    wpc-otp:
      ttl-seconds: 60

  # Outbound URLs — same env vars as the Node broker so docker-compose stays drop-in
  external:
    pid-validate-url: ${PID_VALIDATE_URL:http://mock-pid:3006/auth/validate-launch-token}
    dealers-attr-url: ${DEALERS_ATTR_URL:http://role-api:3004}
    dashboard-url:    ${DASHBOARD_URL:http://flow-dashboard:3007}
    broker-public-url: ${BROKER_PUBLIC_URL:http://broker.sso.test:8000}

  # Admin guard — header values that must accompany /ws/admin SOAP calls
  admin:
    api-key: ${ADMIN_API_KEY:poc-admin-api-key}
    require-mfa-header: true          # x-admin-mfa: true required for bypass

  # Rate limits — port of poc/apps/iam-broker/src/lib/rate-limiter.js
  rate-limit:
    otp:
      per-ip-limit: 100
      per-ip-window-ms: 60000
      lockout-failures: 3
      lockout-window-ms: 60000
      lockout-duration-ms: 300000

  # Bypass settings — port of poc/apps/iam-broker/src/lib/bypass-store.js
  bypass:
    max-duration-minutes: 240

  # Static target-system fallback (used only if DB is empty on first boot;
  # real catalog lives in IA_TB_SSO_SYS_MNGMT_M and is seeded by Flyway V2)
  target-systems-seed-on-empty: true

  # ── OIDC RP — broker authenticates users at upstream PID via OIDC ────────────
  # Mirrors production backend/.../OAuthProperties.java. Flow lands at
  # /api/v1/auth/login → PID → /api/v1/auth/callback.
  oidc:
    pid:
      # Flip to true once client-id / client-secret are wired. Disabled by
      # default so the broker keeps booting cleanly without OIDC creds.
      enabled: ${OIDC_PID_ENABLED:false}
      client-id: ${OIDC_PID_CLIENT_ID:}
      client-secret: ${OIDC_PID_CLIENT_SECRET:}
      issuer:             ${OIDC_PID_ISSUER:https://stg-partner.hmg-corp.io/auth}
      # Per HMG-Partner ID OIDC spec: /authorize, /token, /cert (not /oauth2/*).
      authorize-endpoint: ${OIDC_PID_AUTHORIZE_ENDPOINT:https://stg-partner.hmg-corp.io/auth/authorize}
      token-endpoint:     ${OIDC_PID_TOKEN_ENDPOINT:https://stg-partner.hmg-corp.io/auth/token}
      jwks-uri:           ${OIDC_PID_JWKS_URI:https://stg-partner.hmg-corp.io/auth/cert}
      redirect-uri:       ${OIDC_PID_REDIRECT_URI:http://broker.sso.test:8000/api/v1/auth/callback}
      scopes:             ${OIDC_PID_SCOPES:openid profile email}
      state-code-expiry-minutes: 5

  # ── SAML SP-role — broker receives SAML assertions from upstream IdP ─────────
  # Keystore holds the SP's signing keypair (separate from the IdP-role keypair
  # in sso.token.saml — see SamlSpKeyProvider vs SamlSigningKeyProvider).
  saml-sp:
    entity-id:        ${SAML_SP_ENTITY_ID:http://broker.sso.test:8000/sso/saml/metadata}
    keystore-path:    ${SAML_SP_KEYSTORE:keystore/broker-sp.p12}
    keystore-password: ${SAML_SP_KEYSTORE_PASSWORD:changeit}
    key-alias:        ${SAML_SP_KEY_ALIAS:broker-sp}
    # Spring Security SAML2 requires {registrationId} in the ACS pattern;
    # we use registrationId "pid" so the actual ACS URL is /sso/saml/acs/pid.
    acs-url:          ${SAML_SP_ACS_URL:http://broker.sso.test:8000/sso/saml/acs/pid}
    registration-id:  ${SAML_SP_REGISTRATION_ID:pid}
    # Set false to skip wiring the SAML2 filter chain (e.g., before keytool runs)
    enabled:          ${SSO_SAML_SP_ENABLED:true}
    metadata-validity-days: 365
    want-assertions-signed: true

  # ── Upstream IdP — PID acting as SAML IdP ────────────────────────────────────
  saml-idp:
    entity-id:     ${SAML_IDP_ENTITY_ID:https://stg-partner.hmg-corp.io/auth}
    metadata-path: ${SAML_IDP_METADATA_PATH:/idp-metadata/pid-metadata.xml}

  # ── Mock-PID launch-token signing (Phase 4) ──────────────────────────────────
  # When require-signature=true, /sso/receive rejects unsigned launch tokens.
  # Kept false by default so the existing unchanged mock-pid stack still works
  # while we roll out HS256 on the mock-pid side.
  mock-pid:
    require-signature: ${MOCK_PID_REQUIRE_SIGNATURE:false}
    shared-secret:     ${MOCK_PID_SHARED_SECRET:poc-mock-pid-shared-hs256-secret-min-32-bytes!}
