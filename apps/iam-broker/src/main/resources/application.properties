spring.application.name=iam-broker
server.port=3003
server.forward-headers-strategy=framework

# Profile-aware SSO config (mirrors client structure)
spring.config.import=classpath:application-sso.yaml,optional:classpath:application-sso-${spring.profiles.active:local}.yaml

# Datasource — Postgres for POC; production target is Oracle (matches client ojdbc11)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/iam_broker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:iam_broker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:iam_broker_pw}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — schema is owned by Flyway; Hibernate is read-only against it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Spring-WS — all SOAP services live under /ws (matches client publishtoken.wsdl <soap:address location="/ws"/>)
spring.webservices.path=/ws
spring.webservices.servlet.load-on-startup=1

# springdoc / swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging — match client [ServiceName] convention
logging.level.root=INFO
logging.level.com.hma.idpbrokerservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
